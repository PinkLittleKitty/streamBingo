<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream Bingo</title>
  <meta name="description" content="Play custom Stream Bingo. Save checked boxes in real-time.">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="play-container">

    <div class="play-header">
      <h2 id="play-title">Stream Bingo</h2>
      <p id="play-desc">Loading board...</p>
    </div>

    <div class="bingo-board-wrapper">
      <div class="bingo-board" id="bingo-board">
      </div>
    </div>

    <div class="play-actions">
      <button class="btn btn-secondary" id="btn-edit-board">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
          <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
        </svg>
        Edit this Board
      </button>

      <button class="btn btn-secondary" id="btn-reset-board">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67" />
        </svg>
        Reset Card
      </button>

      <button class="btn btn-secondary" id="btn-toggle-obs-preview">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18" />
          <line x1="7" y1="2" x2="7" y2="22" />
          <line x1="17" y1="2" x2="17" y2="22" />
          <line x1="2" y1="12" x2="22" y2="12" />
          <line x1="2" y1="7" x2="7" y2="7" />
          <line x1="2" y1="17" x2="7" y2="17" />
          <line x1="17" y1="17" x2="22" y2="17" />
          <line x1="17" y1="7" x2="22" y2="7" />
        </svg>
        OBS Preview
      </button>

      <button class="btn btn-primary" id="btn-share-play">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <circle cx="18" cy="5" r="3" />
          <circle cx="6" cy="12" r="3" />
          <circle cx="18" cy="19" r="3" />
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
        </svg>
        Share Card
      </button>
    </div>

  </div>

  <div class="dialog-backdrop" id="share-dialog">
    <div class="dialog-box">
      <h3 class="dialog-title" id="share-title">Share Card</h3>
      <p class="dialog-desc" id="share-desc">Copy link to share or use as overlay.</p>

      <div class="url-copy-box">
        <input type="text" id="share-url-input" readonly>
        <button class="btn btn-primary" id="btn-copy-url">Copy</button>
      </div>

      <div class="btn-group" style="justify-content: flex-end;">
        <button class="btn btn-secondary" id="btn-close-dialog">Close</button>
      </div>
    </div>
  </div>

  <script src="play.js"></script>
</body>

</html>
